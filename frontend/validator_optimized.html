<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7501 Entry Validator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        h1 { font-size: 32px; }

        .upload-section {
            padding: 40px;
            text-align: center;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 60px 40px;
            cursor: pointer;
            background: #f8f9ff;
        }

        input[type="file"] { display: none; }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading {
            text-align: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            padding: 40px;
            display: none;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .card.success { border-color: #4caf50; }
        .card.warning { border-color: #ff9800; }
        .card.error { border-color: #f44336; }

        .card-value {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .card.success .card-value { color: #4caf50; }
        .card.warning .card-value { color: #ff9800; }
        .card.error .card-value { color: #f44336; }

        .entries-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .entries-table th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        .entries-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .entries-table tr:hover { background: #f5f5f5; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-match { background: #e8f5e9; color: #4caf50; }
        .status-minor { background: #fff3e0; color: #ff9800; }
        .status-major { background: #ffebee; color: #f44336; }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛃 7501 Entry Summary Validator</h1>
        </header>

        <div class="upload-section" id="uploadSection">
            <div class="upload-box" id="uploadBox">
                <div style="font-size: 48px; margin-bottom: 20px;">📂</div>
                <h2>Drop your 7501 Excel file here</h2>
                <p style="color: #666; margin: 10px 0;">or click to browse</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls">
            </div>
            <div id="fileName" style="margin-top: 20px; color: #667eea; font-weight: 600;"></div>
            <button class="btn" id="validateBtn" disabled>Validate Entries</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Validating entries...</p>
        </div>

        <div class="results-section" id="results">
            <h2 style="margin-bottom: 20px;">Validation Results</h2>

            <div class="summary-grid">
                <div class="card success">
                    <div style="color: #666; font-size: 14px;">Matches</div>
                    <div class="card-value" id="matchCount">0</div>
                </div>
                <div class="card warning">
                    <div style="color: #666; font-size: 14px;">Minor Variances</div>
                    <div class="card-value" id="minorCount">0</div>
                </div>
                <div class="card error">
                    <div style="color: #666; font-size: 14px;">Major Variances</div>
                    <div class="card-value" id="majorCount">0</div>
                </div>
                <div class="card">
                    <div style="color: #666; font-size: 14px;">Total Variance</div>
                    <div class="card-value" id="totalVariance">$0.00</div>
                </div>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All Entries</button>
                <button class="filter-btn" data-filter="major">Major Variances Only</button>
                <button class="filter-btn" data-filter="match">Matches Only</button>
            </div>

            <div style="overflow-x: auto;">
                <table class="entries-table">
                    <thead>
                        <tr>
                            <th>Line</th>
                            <th>HTS</th>
                            <th>Country</th>
                            <th>Value</th>
                            <th>Declared</th>
                            <th>Calculated</th>
                            <th>Variance</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        console.log('Validator loaded');
        
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const validateBtn = document.getElementById('validateBtn');
        
        uploadBox.onclick = () => fileInput.click();
        
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                document.getElementById('fileName').textContent = `Selected: ${file.name}`;
                validateBtn.disabled = false;
            }
        };

        validateBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            console.log('Starting validation...');
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                console.log('Sending request to API...');
                const response = await fetch('http://localhost:8000/api/validate-entry', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                document.getElementById('loadingText').textContent = 'Processing results...';
                const data = await response.json();
                console.log('Data received:', data.total_lines, 'lines');

                displayResults(data);
            } catch (error) {
                console.error('Validation error:', error);
                alert('Error: ' + error.message);
                document.getElementById('uploadSection').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        function displayResults(data) {
            console.log('Displaying results...');
            
            // Calculate stats
            let matches = 0, minor = 0, major = 0, totalVar = 0;
            
            data.results.forEach(r => {
                if (r.error) return;
                const v = Math.abs(r.variance || 0);
                totalVar += v;
                
                if (v < 1) matches++;
                else if (r.variance_percent < 5) minor++;
                else major++;
            });

            document.getElementById('matchCount').textContent = matches;
            document.getElementById('minorCount').textContent = minor;
            document.getElementById('majorCount').textContent = major;
            document.getElementById('totalVariance').textContent = `$${totalVar.toFixed(2)}`;

            // Render table in batches
            renderTable(data.results);
            
            document.getElementById('results').style.display = 'block';
            console.log('Results displayed');
        }

        function renderTable(results, filter = 'all') {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            console.log('Rendering', results.length, 'rows...');

            // Batch render to avoid blocking
            let batch = [];
            results.forEach((r, i) => {
                if (r.error) return;

                const v = Math.abs(r.variance || 0);
                const status = v < 1 ? 'match' : r.variance_percent < 5 ? 'minor' : 'major';
                
                if (filter !== 'all' && status !== filter) return;

                const badge = status === 'match' ? '✅' : status === 'minor' ? '⚠️' : '❌';

                batch.push(`
                    <tr>
                        <td>${r.line}</td>
                        <td>${r.hts_code}</td>
                        <td>${r.country}</td>
                        <td>$${r.entered_value.toFixed(0)}</td>
                        <td>$${r.declared_duty.toFixed(2)}</td>
                        <td>$${r.calculated_duty.toFixed(2)}</td>
                        <td style="font-weight:bold;color:${r.variance > 0 ? '#f44336' : '#4caf50'}">
                            $${r.variance.toFixed(2)}
                        </td>
                        <td><span class="status-badge status-${status}">${badge} ${status.toUpperCase()}</span></td>
                    </tr>
                `);
            });

            tbody.innerHTML = batch.join('');
            console.log('Table rendered');
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Would need to store results globally to filter
            };
        });
    </script>
</body>
</html>
